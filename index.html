<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập hệ thống</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #2c3e50; /* Màu nền tối cho sang trọng */
            margin: 0; 
        }
        .login-box { 
            background-color: white; 
            padding: 40px 30px; 
            border-radius: 8px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            width: 320px; 
        }
        h2 { 
            text-align: center; 
            color: #2c3e50; 
            margin-top: 0; 
            margin-bottom: 25px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .input-group { 
            margin-bottom: 20px; 
        }
        .input-group label { 
            display: block; 
            margin-bottom: 8px; 
            color: #333; 
            font-weight: bold;
        }
        .input-group input { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-size: 15px;
        }
        .input-group input:focus {
            border-color: #3498db;
            outline: none;
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #3498db; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { 
            background-color: #2980b9; 
        }
        .error { 
            color: #e74c3c; 
            font-size: 14px; 
            text-align: center; 
            margin-top: 15px; 
            display: none; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Đăng nhập Hệ thống</h2>
        <form onsubmit="xuLyDangNhap(event)">
            <div class="input-group">
                <label>Tên đăng nhập:</label>
                <input type="text" id="username" placeholder="Nhập tài khoản..." required autocomplete="off">
            </div>
            <div class="input-group">
                <label>Mật khẩu:</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu..." required>
            </div>
            <button type="submit">Đăng nhập</button>
            <p id="error-msg" class="error">Tên đăng nhập hoặc mật khẩu không đúng!</p>
        </form>
    </div>

    <script>
        // Khi trang đăng nhập vừa load lên, kiểm tra xem hệ thống đã có database tài khoản chưa.
        // Nếu chưa có (nghĩa là hệ thống mới chạy lần đầu), tạo ngay 1 tài khoản Admin gốc để không bị khóa ngoài.
        window.onload = function() {
            let danhSachTaiKhoan = localStorage.getItem("dbTaiKhoan");
            if (!danhSachTaiKhoan) {
                let adminGoc = [
                    { 
                        username: "admin", 
                        password: "123", 
                        role: "admin", 
                        info: { 
                            name: "Nguyễn Quản Trị (Gốc)", 
                            position: "Quản trị viên hệ thống", 
                            email: "admin@truong.edu.vn" 
                        } 
                    }
                ];
                localStorage.setItem("dbTaiKhoan", JSON.stringify(adminGoc));
            }
        };

        // Hàm xử lý khi người dùng bấm nút Đăng nhập
        function xuLyDangNhap(event) {
            event.preventDefault(); // Ngăn trình duyệt load lại trang khi submit form

            const userVal = document.getElementById("username").value.trim();
            const passVal = document.getElementById("password").value;
            const errorMsg = document.getElementById("error-msg");

            // 1. Kéo toàn bộ danh sách tài khoản từ hệ thống (nơi Admin đã thêm mới) ra
            let danhSachTaiKhoan = JSON.parse(localStorage.getItem("dbTaiKhoan")) || [];

            // 2. Tìm kiếm xem có tài khoản nào khớp cả tên và mật khẩu không
            const taiKhoanHopLe = danhSachTaiKhoan.find(tk => tk.username === userVal && tk.password === passVal);

            if (taiKhoanHopLe) {
                // Đăng nhập thành công!
                errorMsg.style.display = "none";
                
                // Lưu thông tin người này vào biến "currentUser" để các trang chủ (trangchu1, trangchu2) biết ai đang đăng nhập
                localStorage.setItem("currentUser", JSON.stringify(taiKhoanHopLe));
                
                // 3. Phân quyền và điều hướng
                if (taiKhoanHopLe.role === "admin") {
                    window.location.href = "trangchu1.html"; // Mở trang Admin
                } else if (taiKhoanHopLe.role === "student") {
                    window.location.href = "trangchu2.html"; // Mở trang Sinh viên
                }
            } else {
                // Sai tài khoản hoặc mật khẩu
                errorMsg.style.display = "block";
            }
        }
    </script>
</body>
</html>
