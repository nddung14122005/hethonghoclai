<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin cá nhân - Sinh Viên</title>
    <style>
        /* CSS dùng chung (giống file admin) */
        body { font-family: Arial, sans-serif; display: flex; margin: 0; height: 100vh; background-color: #f4f6f7; }
        nav { width: 250px; background-color: #2c3e50; color: white; display: flex; flex-direction: column; }
        nav ul { list-style-type: none; padding: 0; margin: 0; display: flex; flex-direction: column; flex-grow: 1; }
        nav ul li { border-bottom: 1px solid rgba(255, 255, 255, 0.2); }
        nav ul li a { color: white; text-decoration: none; display: block; padding: 15px 20px; transition: 0.2s; }
        nav ul li a:hover { background-color: #34495e; padding-left: 25px; } 
        
        .active-menu { background-color: #34495e; padding-left: 25px; font-weight: bold; border-left: 4px solid #3498db; }
        .logout-item { margin-top: auto; background-color: #c0392b; border-bottom: none; }
        .logout-item a:hover { background-color: #e74c3c; padding-left: 20px; }

        main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        
        /* Khung Profile */
        .profile-container {
            display: flex;
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 700px;
            margin-top: 20px;
        }
        .avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-right: 40px;
            border-right: 2px solid #ecf0f1;
            padding-right: 40px;
        }
        .avatar {
            width: 120px;
            height: 120px;
            background-color: #3498db; /* Màu xanh cho sinh viên */
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .info-section { flex-grow: 1; }
        .info-section h2 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; }
        .info-row { margin: 15px 0; font-size: 16px; border-bottom: 1px dashed #ccc; padding-bottom: 8px; }
        .info-row strong { display: inline-block; width: 150px; color: #555; }
        .info-value { color: #2c3e50; font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="trangchu2.html">Trang chủ</a></li>
            <li><a href="thongtin_sinhvien.html" class="active-menu">Xem thông tin cá nhân</a></li>
            <li><a href="danhsach_mon_dangkihoclai_sv.html">DS môn học lại & Đăng ký</a></li>
            <li><a href="danhsach_da_dangky_sv.html">Danh sách đã đăng ký học lại</a></li>
            <li><a href="lich_hoclai_sv.html">Xem lịch học lại</a></li>
            <li class="logout-item"><a href="#" onclick="dangXuat()">Đăng xuất</a></li>
        </ul>
    </nav>
    <main>
        <h1>Hồ sơ Sinh viên</h1>
        <div class="profile-container">
            <div class="avatar-section">
                <div class="avatar" id="avatar-initial">S</div>
                <p style="color: #7f8c8d; font-size: 14px;">Ảnh đại diện</p>
            </div>
            <div class="info-section">
                <h2>Chi tiết thông tin</h2>
                <div class="info-row"><strong>Họ và tên:</strong> <span class="info-value" id="sv-name">...</span></div>
                <div class="info-row"><strong>Mã sinh viên:</strong> <span class="info-value" id="sv-id">...</span></div>
                <div class="info-row"><strong>Tên đăng nhập:</strong> <span class="info-value" id="sv-username">...</span></div>
                <div class="info-row"><strong>Lớp:</strong> <span class="info-value" id="sv-class">...</span></div>
                <div class="info-row"><strong>Chuyên ngành:</strong> <span class="info-value" id="sv-major">...</span></div>
                <div class="info-row"><strong>Trạng thái:</strong> <span class="info-value" style="color: #27ae60;" id="sv-status">...</span></div>
            </div>
        </div>
    </main>

    <script>
        const user = JSON.parse(localStorage.getItem("currentUser"));
        if (!user || user.role !== "student") {
            alert("Bạn không có quyền truy cập trang này!");
            window.location.href = "dangnhap.html";
        } else {
            document.getElementById("sv-name").innerText = user.info.name;
            document.getElementById("sv-id").innerText = user.info.studentId || "Chưa cập nhật";
            document.getElementById("sv-username").innerText = user.username;
            document.getElementById("sv-class").innerText = user.info.class || "Chưa cập nhật";
            document.getElementById("sv-major").innerText = user.info.major || "Chưa cập nhật";
            document.getElementById("sv-status").innerText = user.info.status || "Đang học";
            
            // Lấy chữ cái đầu tiên của tên
            document.getElementById("avatar-initial").innerText = user.info.name.charAt(0).toUpperCase();
        }

        function dangXuat() {
            localStorage.removeItem("currentUser");
            window.location.href = "dangnhap.html";
        }
    </script>
</body>
</html>
