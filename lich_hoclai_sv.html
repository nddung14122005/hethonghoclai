<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Học Lại - Sinh Viên</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; margin: 0; height: 100vh; background-color: #f4f6f7; }
        nav { width: 250px; background-color: #2c3e50; color: white; display: flex; flex-direction: column; }
        nav ul { list-style-type: none; padding: 0; margin: 0; display: flex; flex-direction: column; flex-grow: 1; }
        nav ul li { border-bottom: 1px solid rgba(255, 255, 255, 0.2); }
        nav ul li a { color: white; text-decoration: none; display: block; padding: 15px 20px; transition: 0.2s; }
        nav ul li a:hover { background-color: #34495e; padding-left: 25px; } 
        .active-menu { background-color: #34495e; padding-left: 25px; font-weight: bold; border-left: 4px solid #3498db; }
        .logout-item { margin-top: auto; background-color: #c0392b; border-bottom: none; }
        .logout-item a:hover { background-color: #e74c3c; padding-left: 20px; }

        main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .card { background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        table, th, td { border: 1px solid #bdc3c7; }
        th, td { padding: 12px; text-align: left; }
        th { background-color: #ecf0f1; }
        .empty-msg { text-align: center; color: #7f8c8d; font-style: italic; padding: 20px; }
        .room-badge { background-color: #f39c12; color: white; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 13px; }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="trangchu2.html">Trang chủ</a></li>
            <li><a href="thongtin_sinhvien.html">Xem thông tin cá nhân</a></li>
            <li><a href="danhsach_mon_dangkihoclai_sv.html">DS môn học lại & Đăng ký</a></li>
            <li><a href="danhsach_da_dangky_sv.html">Danh sách đã đăng ký học lại</a></li>
            <li><a href="lich_hoclai_sv.html" class="active-menu">Xem lịch học lại</a></li>
            <li class="logout-item"><a href="#" onclick="dangXuat()">Đăng xuất</a></li>
        </ul>
    </nav>
    <main>
        <h1>Thời Khóa Biểu Học Lại</h1>
        
        <div class="card">
            <h2>Lịch học của các môn bạn đã đăng ký</h2>
            <table>
                <thead>
                    <tr>
                        <th>Mã môn</th>
                        <th>Tên môn học</th>
                        <th>Thứ</th>
                        <th>Thời gian</th>
                        <th>Phòng học</th>
                    </tr>
                </thead>
                <tbody id="student-schedule-table">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        const currentUser = JSON.parse(localStorage.getItem("currentUser"));
        if (!currentUser || currentUser.role !== "student") {
            window.location.href = "dangnhap.html";
        }

        function loadLichHocSinhVien() {
            // 1. Lấy danh sách các môn SV này đã đăng ký
            const keyDangKy = "dangKy_" + currentUser.username;
            const cacMonDaDangKy = JSON.parse(localStorage.getItem(keyDangKy)) || [];
            
            // 2. Lấy toàn bộ lịch của trường do Admin xếp
            const dbLichHocLai = JSON.parse(localStorage.getItem("dbLichHocLai")) || [];
            
            const tbody = document.getElementById("student-schedule-table");
            tbody.innerHTML = "";

            if (cacMonDaDangKy.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="empty-msg">Bạn chưa đăng ký môn học nào nên chưa có lịch.</td></tr>`;
                return;
            }

            let coLich = false;

            // 3. Quét từng môn đã đăng ký, đối chiếu với lịch trường để hiển thị
            cacMonDaDangKy.forEach(monDangKy => {
                const lichCuaMon = dbLichHocLai.find(l => l.maMon === monDangKy.maMon);
                
                if (lichCuaMon) {
                    coLich = true;
                    tbody.innerHTML += `<tr>
                        <td><strong>${monDangKy.maMon}</strong></td>
                        <td>${monDangKy.tenMon}</td>
                        <td style="color: #c0392b; font-weight: bold;">${lichCuaMon.thuHoc}</td>
                        <td>${lichCuaMon.caHoc}</td>
                        <td><span class="room-badge">${lichCuaMon.phongHoc}</span></td>
                    </tr>`;
                } else {
                    // Môn đã đăng ký nhưng Admin chưa xếp lịch
                    coLich = true;
                    tbody.innerHTML += `<tr>
                        <td><strong>${monDangKy.maMon}</strong></td>
                        <td>${monDangKy.tenMon}</td>
                        <td colspan="3" style="color: #7f8c8d; font-style: italic;">Phòng đào tạo đang xếp lịch...</td>
                    </tr>`;
                }
            });

            if (!coLich) {
                tbody.innerHTML = `<tr><td colspan="5" class="empty-msg">Hiện chưa có lịch cho các môn bạn đăng ký.</td></tr>`;
            }
        }

        function dangXuat() {
            localStorage.removeItem("currentUser");
            window.location.href = "dangnhap.html";
        }

        loadLichHocSinhVien();
    </script>
</body>
</html>
