<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đã đăng ký - Sinh Viên</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; margin: 0; height: 100vh; background-color: #f4f6f7; }
        nav { width: 250px; background-color: #2c3e50; color: white; display: flex; flex-direction: column; }
        nav ul { list-style-type: none; padding: 0; margin: 0; display: flex; flex-direction: column; flex-grow: 1; }
        nav ul li { border-bottom: 1px solid rgba(255, 255, 255, 0.2); }
        nav ul li a { color: white; text-decoration: none; display: block; padding: 15px 20px; transition: 0.2s; }
        nav ul li a:hover { background-color: #34495e; padding-left: 25px; } 
        .active-menu { background-color: #34495e; padding-left: 25px; font-weight: bold; border-left: 4px solid #3498db; }
        .logout-item { margin-top: auto; background-color: #c0392b; border-bottom: none; }
        .logout-item a:hover { background-color: #e74c3c; padding-left: 20px; }

        main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .card { background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        table, th, td { border: 1px solid #bdc3c7; }
        th, td { padding: 12px; text-align: left; }
        th { background-color: #ecf0f1; }
        
        .status-badge { background-color: #27ae60; color: white; padding: 5px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .empty-msg { text-align: center; color: #7f8c8d; font-style: italic; padding: 20px; }
        
        /* Nút Hủy dành cho sinh viên */
        .btn-cancel { background-color: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s; }
        .btn-cancel:hover { background-color: #c0392b; }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="trangchu2.html">Trang chủ</a></li>
            <li><a href="thongtin_sinhvien.html">Xem thông tin cá nhân</a></li>
            <li><a href="danhsach_mon_dangkihoclai_sv.html">DS môn học lại & Đăng ký</a></li>
            <li><a href="danhsach_da_dangky_sv.html" class="active-menu">Danh sách đã đăng ký học lại</a></li>
            <li><a href="lich_hoclai_sv.html">Xem lịch học lại</a></li>
            <li class="logout-item"><a href="#" onclick="dangXuat()">Đăng xuất</a></li>
        </ul>
    </nav>
    <main>
        <h1>Kết quả đăng ký</h1>
        
        <div class="card">
            <h2>Các môn học lại bạn đã đăng ký</h2>
            <table>
                <thead>
                    <tr>
                        <th>STT</th>
                        <th>Mã môn</th>
                        <th>Tên môn học</th>
                        <th>Số tín chỉ</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th> </tr>
                </thead>
                <tbody id="registered-table">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        const currentUser = JSON.parse(localStorage.getItem("currentUser"));
        if (!currentUser || currentUser.role !== "student") {
            window.location.href = "dangnhap.html";
        }

        function loadKetQuaDangKy() {
            const keyDangKy = "dangKy_" + currentUser.username;
            const danhSachDaDangKy = JSON.parse(localStorage.getItem(keyDangKy)) || [];
            
            const tbody = document.getElementById("registered-table");
            tbody.innerHTML = "";
            
            if (danhSachDaDangKy.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="empty-msg">Bạn chưa đăng ký môn học lại nào.</td></tr>`;
                return;
            }

            danhSachDaDangKy.forEach((mon, index) => {
                tbody.innerHTML += `<tr>
                    <td>${index + 1}</td>
                    <td><strong>${mon.maMon}</strong></td>
                    <td>${mon.tenMon}</td>
                    <td>${mon.tinChi}</td>
                    <td><span class="status-badge">Đã ghi nhận</span></td>
                    <td>
                        <button class="btn-cancel" onclick="sinhVienTuHuyMon('${mon.maMon}', '${mon.tenMon}')">Hủy đăng ký</button>
                    </td>
                </tr>`;
            });
        }

        // Chức năng mới: Sinh viên tự hủy môn
        function sinhVienTuHuyMon(maMon, tenMon) {
            if (confirm(`Bạn có chắc chắn muốn HỦY đăng ký môn ${tenMon} (${maMon}) không?`)) {
                const keyDangKy = "dangKy_" + currentUser.username;
                let danhSachDaDangKy = JSON.parse(localStorage.getItem(keyDangKy)) || [];
                
                // Lọc bỏ môn học mà sinh viên muốn hủy
                danhSachDaDangKy = danhSachDaDangKy.filter(mon => mon.maMon !== maMon);
                
                // Lưu lại danh sách mới vào localStorage
                localStorage.setItem(keyDangKy, JSON.stringify(danhSachDaDangKy));
                
                // Tải lại bảng để cập nhật giao diện
                loadKetQuaDangKy();
                alert(`Bạn đã hủy môn ${tenMon} thành công!`);
            }
        }

        function dangXuat() {
            localStorage.removeItem("currentUser");
            window.location.href = "index.html";
        }

        // Gọi hàm hiển thị bảng
        loadKetQuaDangKy();
    </script>
</body>
</html>
