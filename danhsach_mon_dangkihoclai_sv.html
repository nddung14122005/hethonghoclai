<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký Môn Học Lại - Sinh Viên</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; margin: 0; height: 100vh; background-color: #f4f6f7; }
        nav { width: 250px; background-color: #2c3e50; color: white; display: flex; flex-direction: column; }
        nav ul { list-style-type: none; padding: 0; margin: 0; display: flex; flex-direction: column; flex-grow: 1; }
        nav ul li { border-bottom: 1px solid rgba(255, 255, 255, 0.2); }
        nav ul li a { color: white; text-decoration: none; display: block; padding: 15px 20px; transition: 0.2s; }
        nav ul li a:hover { background-color: #34495e; padding-left: 25px; } 
        .active-menu { background-color: #34495e; padding-left: 25px; font-weight: bold; border-left: 4px solid #3498db; }
        .logout-item { margin-top: auto; background-color: #c0392b; border-bottom: none; }
        .logout-item a:hover { background-color: #e74c3c; padding-left: 20px; }

        main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .card { background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        table, th, td { border: 1px solid #bdc3c7; }
        th, td { padding: 12px; text-align: left; }
        th { background-color: #ecf0f1; }
        .btn-register { background-color: #3498db; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-register:hover { background-color: #2980b9; }
        .registered-text { color: #27ae60; font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="trangchu2.html">Trang chủ</a></li>
            <li><a href="thongtin_sinhvien.html">Xem thông tin cá nhân</a></li>
            <li><a href="danhsach_mon_dangkihoclai_sv.html" class="active-menu">DS môn học lại & Đăng ký</a></li>
            <li><a href="danhsach_da_dangky_sv.html">Danh sách đã đăng ký học lại</a></li>
            <li><a href="lich_hoclai_sv.html">Xem lịch học lại</a></li>
            <li class="logout-item"><a href="#" onclick="dangXuat()">Đăng xuất</a></li>
        </ul>
    </nav>
    <main>
        <h1>Đăng ký Môn Học Lại</h1>
        
        <div class="card">
            <h2>Danh sách các môn đang mở</h2>
            <table>
                <thead>
                    <tr>
                        <th>Mã môn</th>
                        <th>Tên môn học</th>
                        <th>Số tín chỉ</th>
                        <th>Trạng thái</th>
                    </tr>
                </thead>
                <tbody id="student-course-table">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        const currentUser = JSON.parse(localStorage.getItem("currentUser"));
        if (!currentUser || currentUser.role !== "student") {
            window.location.href = "dangnhap.html";
        }

        // Lấy danh sách môn học do Admin tạo
        let dbMonHocLai = JSON.parse(localStorage.getItem("dbMonHocLai")) || [];
        
        // Lấy danh sách những môn SINH VIÊN NÀY đã đăng ký
        // Dùng username làm key để mỗi sinh viên có một danh sách đăng ký riêng
        let keyDangKy = "dangKy_" + currentUser.username;
        let danhSachDaDangKy = JSON.parse(localStorage.getItem(keyDangKy)) || [];

        function loadDanhSachMonSV() {
            const tbody = document.getElementById("student-course-table");
            tbody.innerHTML = "";
            
            if (dbMonHocLai.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;">Hiện tại chưa có môn học lại nào được mở.</td></tr>`;
                return;
            }

            dbMonHocLai.forEach((mon) => {
                // Kiểm tra xem môn này sinh viên đã đăng ký chưa
                let daDangKy = danhSachDaDangKy.some(m => m.maMon === mon.maMon);
                
                let actionHtml = daDangKy 
                    ? `<span class="registered-text">Đã đăng ký ✔️</span>` 
                    : `<button class="btn-register" onclick="dangKyMon('${mon.maMon}')">Đăng ký</button>`;

                tbody.innerHTML += `<tr>
                    <td><strong>${mon.maMon}</strong></td>
                    <td>${mon.tenMon}</td>
                    <td>${mon.tinChi}</td>
                    <td>${actionHtml}</td>
                </tr>`;
            });
        }

        function dangKyMon(maMon) {
            // Tìm thông tin môn học trong DB gốc
            const monHoc = dbMonHocLai.find(m => m.maMon === maMon);
            if (monHoc) {
                if (confirm(`Bạn có chắc chắn muốn đăng ký môn ${monHoc.tenMon} không?`)) {
                    // Thêm vào danh sách cá nhân của sinh viên
                    danhSachDaDangKy.push(monHoc);
                    localStorage.setItem(keyDangKy, JSON.stringify(danhSachDaDangKy));
                    
                    alert("Đăng ký thành công!");
                    loadDanhSachMonSV(); // Load lại bảng để đổi nút thành "Đã đăng ký"
                }
            }
        }

        function dangXuat() {
            localStorage.removeItem("currentUser");
            window.location.href = "dangnhap.html";
        }

        loadDanhSachMonSV();
    </script>
</body>
</html>
